appId: com.invoice-helper
productName: 发票管理助手
copyright: Copyright © 2026
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!test/*'
  - '!docs/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,CLAUDE.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!*.md'
  - '!*.log'
  - '!.claude/*'
  - '!test/**/*'
asarUnpack:
  - '**/*.node'
  - '**/better-sqlite3/**'
win:
  executableName: invoice-helper
  target:
    - nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSDocumentsFolderUsageDescription: 'Application requests access to the user''s Documents folder.'
    NSDownloadsFolderUsageDescription: 'Application requests access to the user''s Downloads folder.'
  notarize: false
  artifactName: ${name}-${version}-mac.${ext}
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: invoice-helper
  category: Office
appImage:
  artifactName: ${name}-${version}.${ext}
