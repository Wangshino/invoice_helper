<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#2B5CE6"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1a3a7a" flood-opacity="0.25"/>
    </filter>
    <filter id="innerShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle pattern: small circles -->
  <circle cx="380" cy="100" r="60" fill="#fff" opacity="0.06"/>
  <circle cx="420" cy="400" r="40" fill="#fff" opacity="0.05"/>
  <circle cx="100" cy="380" r="50" fill="#fff" opacity="0.04"/>

  <!-- Main document/invoice -->
  <g filter="url(#shadow)">
    <rect x="120" y="80" width="272" height="352" rx="16" fill="url(#paper)"/>
  </g>

  <!-- Document fold corner -->
  <path d="M344 80 L392 80 Q400 80 400 88 L400 136 Z" fill="#E0E8F5" opacity="0.8"/>

  <!-- Header bar -->
  <rect x="148" y="108" width="216" height="6" rx="3" fill="#4F8EF7" opacity="0.7"/>
  <rect x="148" y="122" width="140" height="4" rx="2" fill="#4F8EF7" opacity="0.35"/>

  <!-- Divider -->
  <rect x="148" y="142" width="216" height="1" fill="#D6E0F0"/>

  <!-- Invoice line items -->
  <rect x="148" y="160" width="180" height="5" rx="2.5" fill="#C5D3E8"/>
  <rect x="340" y="160" width="40" height="5" rx="2.5" fill="#C5D3E8"/>

  <rect x="148" y="180" width="150" height="5" rx="2.5" fill="#D6E0F0"/>
  <rect x="310" y="180" width="60" height="5" rx="2.5" fill="#D6E0F0"/>

  <rect x="148" y="200" width="200" height="5" rx="2.5" fill="#C5D3E8"/>
  <rect x="360" y="200" width="30" height="5" rx="2.5" fill="#C5D3E8"/>

  <rect x="148" y="220" width="130" height="5" rx="2.5" fill="#D6E0F0"/>
  <rect x="290" y="220" width="70" height="5" rx="2.5" fill="#D6E0F0"/>

  <!-- Divider -->
  <rect x="148" y="244" width="216" height="1" fill="#D6E0F0"/>

  <!-- Total row -->
  <rect x="148" y="260" width="60" height="5" rx="2.5" fill="#4F8EF7" opacity="0.6"/>
  <rect x="300" y="258" width="64" height="9" rx="3" fill="#4F8EF7" opacity="0.85"/>

  <!-- Divider -->
  <rect x="148" y="282" width="216" height="1" fill="#D6E0F0"/>

  <!-- Stamp / seal circle -->
  <circle cx="256" cy="348" r="48" fill="none" stroke="#E85050" stroke-width="4" opacity="0.7"/>
  <circle cx="256" cy="348" r="38" fill="none" stroke="#E85050" stroke-width="2" opacity="0.5"/>

  <!-- Checkmark inside seal -->
  <path d="M232 348 L248 364 L280 332" fill="none" stroke="#E85050" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

  <!-- ¥ symbol in seal top -->
  <text x="256" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#E85050" opacity="0.6">¥</text>
</svg>
